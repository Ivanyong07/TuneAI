<!doctype html>
<!-- python -m http.server 3000  open server-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="static/css/style.css" />
  </head>
  <body
    class="bg-black text-white min-h-screen flex flex-col items-center justify-center"
  >
    <div class="home-page justify-center items-center flex flex-col">
      <h1 class="text-4xl font-bold mb-2">ToneAI</h1>
      <p class="text-white/50 mb-8">Point your camera at any instrument</p>
    </div>

    <!-- Full screen camera -->
    <div class="relative w-full h-screen">
      <!-- Camera feed -->
      <video
        id="video"
        autoplay
        playsinline
        class="w-full h-full object-cover"
      ></video>

      <canvas id="canvas" class="hidden"></canvas>
      <canvas id="hands-canvas" class="absolute inset-0 w-full h-full"></canvas>

      <!-- 3D Model Display - hidden by default -->
      <div
        id="model-container"
        class="hidden fixed z-50"
        style="top: 20px; left: 20px"
      >
        <div
          class="border-2 border-violet-400 rounded-2xl overflow-hidden"
          style="width: 500px; height: 600px"
        >
          <model-viewer
            id="instrument-model"
            src=""
            camera-controls
            autoplay
            auto-rotate
            animation-name="explode"
            scale="12 12 12"
            camera-orbit="0deg 80deg 1.2m"
            field-of-view="40deg"
            shadow-intensity="1"
            style="width: 100%; height: 100%; --poster-color: transparent"
          >
          </model-viewer>
        </div>
      </div>

      <div class="absolute top-6 left-0 right-0 text-center">
        <h1 class="text-2xl font-bold">ToneAI</h1>
        <p id="status-text" class="text-white/50 text-sm mt-1">Scanning...</p>
      </div>

      <div
        id="result-box"
        class="hidden absolute bottom-10 left-4 right-4 bg-black/70 backdrop-blur rounded-2xl p-5 text-center"
      >
        <p class="text-white/50 text-xs mb-1 uppercase tracking-widest">
          Detected
        </p>
        <p id="instrument-name" class="text-3xl font-bold mb-1"></p>
        <p id="confidence-text" class="text-violet-400 text-sm"></p>
      </div>
    </div>
    <script src="static/mediapipe/hands/hands.js"></script>
    <script src="static/mediapipe/camera_utils/camera_utils.js"></script>

    <script src="static/js/hands.js"></script>
    <script src="static/js/camera.js"></script>
    <script src="static/js/index.js"></script>

    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
  </body>
</html>
